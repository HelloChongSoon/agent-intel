<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Bar chart representing rankings/intel -->
  <rect x="100" y="280" width="64" height="140" rx="8" fill="url(#accent)" opacity="0.5"/>
  <rect x="188" y="200" width="64" height="220" rx="8" fill="url(#accent)" opacity="0.7"/>
  <rect x="276" y="140" width="64" height="280" rx="8" fill="url(#accent)" opacity="0.85"/>
  <rect x="364" y="92" width="64" height="328" rx="8" fill="url(#accent)"/>
  <!-- Trend line -->
  <polyline points="132,260 220,180 308,120 396,72" fill="none" stroke="#f0f9ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- Dot accents on trend line -->
  <circle cx="132" cy="260" r="8" fill="#f0f9ff"/>
  <circle cx="220" cy="180" r="8" fill="#f0f9ff"/>
  <circle cx="308" cy="120" r="8" fill="#f0f9ff"/>
  <circle cx="396" cy="72" r="10" fill="#f0f9ff"/>
</svg>
